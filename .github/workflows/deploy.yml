name: Deploy KinesioTrack → Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (build-env baked in)
        run: |
          npx vercel@latest deploy \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --build-env VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-env VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            2>&1 | tee /tmp/vercel-out.txt
          cat /tmp/vercel-out.txt
